name: Android APK Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# R240 (2026-07-19): self-hosted runner — FREE-ONLY, no paid ubuntu-latest. See COMPANY_RULES.md R240.
# Note: Node 22 (cap sync requires >=22) via setup-node@v4, Java via setup-java@v4.
# Android SDK: android-actions/setup-android@v3 works on self-hosted Linux.
# Prereq: ANDROID_SDK_ROOT must be set or setup-android installs it to ~/Android/Sdk.

jobs:
  test:
    name: Python + TS Tests
    runs-on: [self-hosted, linux, x64, hostinger]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TS tests
        run: npm test

      - name: Install Python deps
        # self-hosted runner (Debian 13) — system Python 3.13 used directly; setup-python has no Debian 13 manifest
        run: pip install --break-system-packages fastapi httpx pytest pytest-mock pydantic requests uvicorn stripe

      - name: Run Python tests
        run: python3 -m pytest -v

  build-apk:
    name: Build Android APK
    runs-on: [self-hosted, linux, x64, hostinger]
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify APK exists
        run: |
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          echo "APK_SIZE=$(du -sh android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentTerminalsWatch-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: APK build summary
        run: |
          echo "## APK Build" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Download: Actions > Artifacts" >> $GITHUB_STEP_SUMMARY
